<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DUY Dashboard preview">
  <defs>
    <linearGradient id="duyBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/><stop offset=".55" stop-color="#312e81"/><stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="duyBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="460" fill="url(#duyBg)"/>
  <!-- top bar -->
  <circle cx="34" cy="34" r="6" fill="#f87171"/><circle cx="56" cy="34" r="6" fill="#fbbf24"/><circle cx="78" cy="34" r="6" fill="#34d399"/>
  <rect x="120" y="24" width="220" height="20" rx="10" fill="#ffffff" opacity=".10"/>
  <rect x="624" y="22" width="150" height="24" rx="12" fill="#22c55e" opacity=".25"/>
  <text x="700" y="39" font-family="monospace" font-size="13" fill="#86efac" text-anchor="middle" font-weight="700">batch 2026 · LIVE</text>
  <!-- headline -->
  <text x="34" y="110" font-family="Inter,system-ui,sans-serif" font-size="15" fill="#c7d2fe" font-weight="600">REGISTRATIONS</text>
  <text x="34" y="168" font-family="Inter,system-ui,sans-serif" font-size="58" fill="#ffffff" font-weight="800">0 / 70,000</text>
  <!-- funnel bars -->
  <g font-family="Inter,system-ui,sans-serif" font-size="12" fill="#a5b4fc">
    <text x="430" y="100">Registration target</text>
    <rect x="430" y="110" width="330" height="14" rx="7" fill="#ffffff" opacity=".12"/>
    <rect x="430" y="110" width="330" height="14" rx="7" fill="url(#duyBar)"/>
    <text x="430" y="152">Bootcamp target</text>
    <rect x="430" y="162" width="330" height="14" rx="7" fill="#ffffff" opacity=".12"/>
    <rect x="430" y="162" width="120" height="14" rx="7" fill="#f59e0b"/>
    <text x="430" y="204">EDP target</text>
    <rect x="430" y="214" width="330" height="14" rx="7" fill="#ffffff" opacity=".12"/>
    <rect x="430" y="214" width="58" height="14" rx="7" fill="#a855f7"/>
  </g>
  <!-- stat cards -->
  <g>
    <rect x="34" y="250" width="234" height="150" rx="18" fill="#ffffff" opacity=".07"/>
    <rect x="283" y="250" width="234" height="150" rx="18" fill="#ffffff" opacity=".07"/>
    <rect x="532" y="250" width="234" height="150" rx="18" fill="#ffffff" opacity=".07"/>
    <text x="58" y="300" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#fbbf24" font-weight="700">BOOTCAMP</text>
    <text x="58" y="358" font-family="Inter,system-ui,sans-serif" font-size="42" fill="#fff" font-weight="800">1,500</text>
    <text x="307" y="300" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#c084fc" font-weight="700">EDP</text>
    <text x="307" y="358" font-family="Inter,system-ui,sans-serif" font-size="42" fill="#fff" font-weight="800">350</text>
    <text x="556" y="300" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#5eead4" font-weight="700">WINDOW</text>
    <text x="556" y="358" font-family="Inter,system-ui,sans-serif" font-size="42" fill="#fff" font-weight="800">22</text>
  </g>
